# Render Blueprint — Cyber Narrative Radar
# Docs: https://render.com/docs/blueprint-spec
#
# Backend: FastAPI + uvicorn (rootDir: backend)
# Frontend: Vite static site (rootDir: frontend, publish: dist)
#
# FRONTEND_URL and VITE_API_BASE_URL are wired from each service's
# RENDER_EXTERNAL_URL so CORS and API calls match the deployed hosts.
#
# After first deploy, open a Render Shell on the API service and run:
#   python -m app.tasks.seed_demo_data
#   python -m app.tasks.ingest_rss
#   python -m app.tasks.score_posts
# (SQLite on free tier is ephemeral unless you attach a disk / Postgres.)

services:
  - type: web
    name: cyber-narrative-radar-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.9"
      # Local-style SQLite by default; override with Postgres DATABASE_URL in the dashboard if needed.
      - key: DATABASE_URL
        value: sqlite:///./cyber_narrative_radar.db
      - key: LIVE_INGEST
        value: "1"
      - key: LIVE_INGEST_INTERVAL_SECONDS
        value: "300"
      - key: REDDIT_ENABLED
        value: "1"
      - key: AUTO_ALERT_MIN_SCORE
        value: "45"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: cyber-narrative-radar-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: cyber-narrative-radar-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Baked into the Vite client at build time.
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: cyber-narrative-radar-api
          envVarKey: RENDER_EXTERNAL_URL
